name: Daily Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Random Params
        id: random
        run: |
          RAND_MOE=$(date +%s%N | md5sum | head -c 8)
          RAND_FOX=$(date +%s%N | md5sum | head -c 8 | tail -c 4)
          echo "rand_moe=$RAND_MOE" >> $GITHUB_OUTPUT
          echo "rand_fox=$RAND_FOX" >> $GITHUB_OUTPUT

      - name: Fetch Daily Quote
        id: quote
        run: |
          RESPONSE=$(curl -s "https://v1.hitokoto.cn/?c=d&encode=json")
          QUOTE_CN=$(echo $RESPONSE | jq -r '.hitokoto')
          FROM=$(echo $RESPONSE | jq -r '.from')
          
          if [ "$QUOTE_CN" = "null" ] || [ -z "$QUOTE_CN" ]; then
            echo "quote_cn=喵喵喵好像出错了 ~nya" >> $GITHUB_OUTPUT
            echo "quote_en=Meow something went wrong ~nya" >> $GITHUB_OUTPUT
            echo "from=云汀" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "$FROM" = "null" ] || [ -z "$FROM" ]; then
            FROM="Unknown"
          fi
          
          QUOTE_ENCODED=$(echo "$QUOTE_CN" | jq -sRr @uri)
          TRANS_RESPONSE=$(curl -s "https://api.mymemory.translated.net/get?q=${QUOTE_ENCODED}&langpair=zh-CN|en")
          QUOTE_EN=$(echo $TRANS_RESPONSE | jq -r '.responseData.translatedText')
          
          if [ "$QUOTE_EN" = "null" ] || [ -z "$QUOTE_EN" ] || [ "$QUOTE_EN" = "" ]; then
            QUOTE_EN="Meow something went wrong ~nya"
          fi
          
          echo "quote_cn=$QUOTE_CN" >> $GITHUB_OUTPUT
          echo "quote_en=$QUOTE_EN" >> $GITHUB_OUTPUT
          echo "from=$FROM" >> $GITHUB_OUTPUT

      - name: Update README with Python
        run: |
          python3 - << 'PYEOF'
          import re
          import urllib.parse
          import os

          rand_moe = os.environ.get('RAND_MOE', '')
          rand_fox = os.environ.get('RAND_FOX', '')
          quote_cn = os.environ.get('QUOTE_CN', '喵喵喵好像出错了 ~nya')
          quote_en = os.environ.get('QUOTE_EN', 'Meow something went wrong ~nya')
          quote_from = os.environ.get('QUOTE_FROM', '云汀')

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          cn_encoded = urllib.parse.quote(quote_cn.replace(' ', '+'))
          en_encoded = urllib.parse.quote(quote_en.replace(' ', '+'))

          moe_new = f'''<!-- MOE_IMG_START -->
<p align="center">
  <img src="https://t.alcy.cc/moez?r={rand_moe}" width="400" alt="萌图" />
</p>
<!-- MOE_IMG_END -->'''
          content = re.sub(r'<!-- MOE_IMG_START -->.*?<!-- MOE_IMG_END -->', moe_new, content, flags=re.DOTALL)

          fox_new = f'''<!-- FOX_IMG_START -->
<p align="center">
  <img src="https://t.alcy.cc/xhl?r={rand_fox}" width="400" alt="小狐狸" />
</p>
<!-- FOX_IMG_END -->'''
          content = re.sub(r'<!-- FOX_IMG_START -->.*?<!-- FOX_IMG_END -->', fox_new, content, flags=re.DOTALL)

          quote_new = f'''<!-- DAILY_QUOTE_START -->
<p align="center">
  <img src="https://readme-typing-svg.demolab.com?font=Fira+Code&size=18&pause=3000&color=FF69B4&center=true&vCenter=true&width=700&lines={cn_encoded};{en_encoded}" alt="Daily Quote" />
</p>

<p align="center"><b>🎯 中文：</b>{quote_cn}</p>
<p align="center"><b>🎯 English：</b>{quote_en}</p>
<p align="center"><sub>— {quote_from}</sub></p>
<!-- DAILY_QUOTE_END -->'''
          content = re.sub(r'<!-- DAILY_QUOTE_START -->.*?<!-- DAILY_QUOTE_END -->', quote_new, content, flags=re.DOTALL)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(content)
          PYEOF
        env:
          RAND_MOE: ${{ steps.random.outputs.rand_moe }}
          RAND_FOX: ${{ steps.random.outputs.rand_fox }}
          QUOTE_CN: ${{ steps.quote.outputs.quote_cn }}
          QUOTE_EN: ${{ steps.quote.outputs.quote_en }}
          QUOTE_FROM: ${{ steps.quote.outputs.from }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "🔄 Daily update: $(date +%Y-%m-%d)" && git push)
